[koharu-dev]
image=ubuntu:24.04
additional_packages="build-essential cmake golang-go nasm gnupg curl wget file libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev llvm-dev clang libvulkan-dev pkg-config git dbus-x11 libdbus-1-dev vulkan-tools mesa-vulkan-drivers"
# We'll run the setup manually to see the logs
init_hooks="echo 'Contenedor listo. Ejecuta scripts/setup-dev.sh para configurar CUDA y herramientas.'"
# Mount the current directory to /work in the container
volume="${PWD}:/work"
working_directory="/work"
# Enable GPU support
nvidia=true
# Forward X11/Wayland for GUI
xhost=true
pull=true
